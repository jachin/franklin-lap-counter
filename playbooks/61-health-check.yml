---
- name: Franklin Pi runtime health check
  hosts: all
  gather_facts: false
  become: true

  tasks:
    - name: Render runtime health-check script
      ansible.builtin.template:
        src: templates/health-check-report.sh.j2
        dest: /tmp/franklin-health-check-report.sh
        mode: "0755"

    - name: Collect runtime health report as franklin user
      ansible.builtin.command: /tmp/franklin-health-check-report.sh
      become_user: "{{ franklin_user }}"
      register: health_check
      changed_when: false

    - name: Print health report
      ansible.builtin.debug:
        msg: "{{ health_check.stdout_lines }}"
