---
- name: Configure WayVNC for SSH-tunneled remote GUI access
  hosts: all
  become: true
  tasks:
    - name: Ensure wayvnc and openssl are installed
      ansible.builtin.apt:
        name:
          - wayvnc
          - openssl
        state: present

    - name: Ensure wayvnc config directory exists
      ansible.builtin.file:
        path: "{{ franklin_home }}/.config/wayvnc"
        state: directory
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0700"

    - name: Generate wayvnc TLS private key if missing
      ansible.builtin.shell: |
        sudo -u "{{ franklin_user }}" -H bash -lc '
        test -f "{{ franklin_home }}/.config/wayvnc/tls_key.pem" || \
          openssl genrsa -out "{{ franklin_home }}/.config/wayvnc/tls_key.pem" 2048
        chmod 600 "{{ franklin_home }}/.config/wayvnc/tls_key.pem"
        '
      args:
        executable: /bin/bash

    - name: Generate wayvnc self-signed TLS certificate if missing
      ansible.builtin.shell: |
        sudo -u "{{ franklin_user }}" -H bash -lc '
        test -f "{{ franklin_home }}/.config/wayvnc/tls_cert.pem" || \
          openssl req -new -x509 -key "{{ franklin_home }}/.config/wayvnc/tls_key.pem" \
          -out "{{ franklin_home }}/.config/wayvnc/tls_cert.pem" -days 3650 \
          -subj "/CN=franklin-wayvnc"
        chmod 600 "{{ franklin_home }}/.config/wayvnc/tls_cert.pem"
        '
      args:
        executable: /bin/bash

    - name: Generate wayvnc RSA key in legacy PEM format (Apple DH compatibility)
      ansible.builtin.shell: |
        sudo -u "{{ franklin_user }}" -H bash -lc '
        test -f "{{ franklin_home }}/.config/wayvnc/rsa_key.pem" || \
          openssl genrsa -traditional -out "{{ franklin_home }}/.config/wayvnc/rsa_key.pem" 2048
        chmod 600 "{{ franklin_home }}/.config/wayvnc/rsa_key.pem"
        '
      args:
        executable: /bin/bash

    - name: Write wayvnc config for Screen Sharing compatibility
      ansible.builtin.copy:
        dest: "{{ franklin_home }}/.config/wayvnc/config"
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0600"
        content: |
          use_relative_paths=true
          address={{ franklin_wayvnc_bind_address }}
          port={{ franklin_wayvnc_port }}
          enable_auth={{ 'true' if franklin_wayvnc_enable_auth else 'false' }}
          {% if franklin_wayvnc_enable_auth %}
          # rsa_private_key_file enables RSA-AES (RealVNC Viewer, modern Screens
          # app, TigerVNC RA2). The TLS key/cert enable VeNCrypt. relax_encryption
          # keeps sessions usable on clients that don't encrypt post-auth.
          # NOTE: wayvnc 0.9.x does not support legacy DES (VncAuth), so the
          # built-in macOS "Screen Sharing" app cannot connect. Use RealVNC
          # Viewer or TigerVNC instead.
          relax_encryption=true
          username={{ franklin_wayvnc_username }}
          password={{ franklin_wayvnc_password }}
          rsa_private_key_file=rsa_key.pem
          private_key_file=tls_key.pem
          certificate_file=tls_cert.pem
          {% endif %}

    - name: Install wayvnc launcher script in app directory
      ansible.builtin.copy:
        dest: "{{ pi_dest_dir }}/start-wayvnc.sh"
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          cd "$(dirname "$0")"
          touch wayvnc.log

          # Bind to loopback only. Access through SSH tunnel.
          exec wayvnc -C "{{ franklin_home }}/.config/wayvnc/config" -L info >> ./wayvnc.log 2>&1

    - name: Ensure sway autostarts wayvnc when enabled
      ansible.builtin.blockinfile:
        path: "{{ franklin_home }}/.config/sway/config"
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0644"
        marker: "# {mark} ANSIBLE MANAGED WAYVNC"
        block: |
          # Start WayVNC bound to localhost; use SSH port forwarding for access.
          exec {{ pi_dest_dir }}/start-wayvnc.sh
      when:
        - franklin_enable_wayland_boot
        - franklin_enable_wayvnc

    - name: Remove sway wayvnc block when disabled
      ansible.builtin.blockinfile:
        path: "{{ franklin_home }}/.config/sway/config"
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0644"
        marker: "# {mark} ANSIBLE MANAGED WAYVNC"
        block: ""
        state: absent
      when: not franklin_enable_wayvnc
