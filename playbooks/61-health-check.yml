---
- name: Franklin Pi runtime health check
  hosts: all
  gather_facts: false
  become: true

  tasks:
    - name: Ensure caddy service is active
      ansible.builtin.systemd:
        name: caddy.service
      register: caddy_status
      changed_when: false

    - name: Fail when caddy is not active
      ansible.builtin.fail:
        msg: "caddy.service is not active (state={{ caddy_status.status.ActiveState | default('unknown') }})"
      when: caddy_status.status.ActiveState | default('') != 'active'

    - name: Check health-check web app API directly on Pi loopback
      ansible.builtin.uri:
        url: http://127.0.0.1:8082/api/health
        method: GET
        return_content: true
        status_code: 200
      register: healthcheck_liveness
      changed_when: false

    - name: Fail when health-check web app API is not healthy
      ansible.builtin.fail:
        msg: >-
          healthcheck web app is not healthy on 127.0.0.1:8082.
          Response: {{ healthcheck_liveness.json | default(healthcheck_liveness.content | default('n/a')) }}
          Try: devbox run ansible:web-bounce
      when: not (healthcheck_liveness.json.ok | default(false))

    - name: Fetch health report directly from health-check web app
      ansible.builtin.uri:
        url: http://127.0.0.1:8082/api/report
        method: GET
        return_content: true
        status_code: [200, 503]
      register: health_report
      changed_when: false

    - name: Print health report summary
      ansible.builtin.debug:
        msg:
          - "caddy.service: {{ caddy_status.status.ActiveState | default('unknown') }}"
          - "healthcheck api: ok={{ healthcheck_liveness.json.ok | default(false) }}"
          - "health report ok={{ health_report.json.ok | default(false) }} generated_at={{ health_report.json.generated_at | default('n/a') }}"

    - name: Print full health report JSON
      ansible.builtin.debug:
        msg: "{{ health_report.json | to_nice_json }}"
