<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Franklin Health Check</title>
        <style>
            :root {
                color-scheme: light dark;

                --bg: #111;
                --text: #eee;
                --control-bg: #222;
                --control-bg-hover: #2c2c2c;
                --control-border: #444;
                --surface: #000;
                --surface-border: #333;
                --ok: #66d17a;
                --bad: #ff6b6b;
                --loading: #f5c26b;
            }

            @media (prefers-color-scheme: light) {
                :root {
                    --bg: #f6f8fa;
                    --text: #1f2328;
                    --control-bg: #ffffff;
                    --control-bg-hover: #f3f4f6;
                    --control-border: #c7ced6;
                    --surface: #ffffff;
                    --surface-border: #d0d7de;
                    --ok: #1a7f37;
                    --bad: #cf222e;
                    --loading: #9a6700;
                }
            }

            body {
                font-family:
                    system-ui,
                    -apple-system,
                    Segoe UI,
                    Roboto,
                    sans-serif;
                margin: 16px;
                background: var(--bg);
                color: var(--text);
            }
            h1 {
                margin-top: 0;
            }
            .row {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                margin-bottom: 12px;
            }
            button {
                padding: 8px 12px;
                border: 1px solid var(--control-border);
                background: var(--control-bg);
                color: var(--text);
                border-radius: 6px;
                cursor: pointer;
            }
            button:hover {
                background: var(--control-bg-hover);
            }
            #summary {
                margin: 10px 0;
                font-weight: 600;
            }
            .ok {
                color: var(--ok);
            }
            .bad {
                color: var(--bad);
            }
            .loading {
                color: var(--loading);
            }
            #checks {
                background: var(--surface);
                border: 1px solid var(--surface-border);
                padding: 10px;
                margin-bottom: 12px;
            }
            .check-row {
                display: flex;
                align-items: baseline;
                gap: 8px;
                margin-bottom: 6px;
                font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            }
            .check-name {
                min-width: 280px;
                word-break: break-word;
            }
            .check-details {
                white-space: pre-wrap;
                opacity: 0.9;
            }
            #report {
                background: var(--surface);
                border: 1px solid var(--surface-border);
                padding: 10px;
                min-height: 220px;
                overflow: auto;
                font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                white-space: pre-wrap;
                word-break: break-word;
            }
        </style>
    </head>
    <body>
        <style>
            .dash-link {
                display: inline-block;
                font-size: 0.8rem;
                opacity: 0.6;
                text-decoration: none;
                color: inherit;
                margin-bottom: 8px;
            }
            .dash-link:hover { opacity: 1; text-decoration: underline; }
        </style>
        <a id="dashLink" class="dash-link" href="#">← Dashboard</a>
        <script>document.getElementById('dashLink').href = `${location.protocol}//${location.hostname}:8085/dashboard`</script>
        <h1>Health Check</h1>
        <div class="row">
            <button type="button" id="refresh-parallel">
                Refresh (parallel checks)
            </button>
            <button type="button" id="refresh-full">
                Refresh (full report)
            </button>
        </div>
        <div id="summary">Loading...</div>
        <div id="checks"></div>
        <h2>Full Report JSON</h2>
        <div id="report"></div>

        <script>
            const summaryEl = document.getElementById("summary");
            const checksEl = document.getElementById("checks");
            const reportEl = document.getElementById("report");

            function setSummary(text, cls = "") {
                summaryEl.textContent = text;
                summaryEl.className = cls;
            }

            function checkRow(name, status = "loading", details = "") {
                const row = document.createElement("div");
                row.className = "check-row";
                row.id = `check-${name}`;

                const icon = document.createElement("span");
                icon.className = `check-icon ${status}`;
                icon.textContent =
                    status === "ok" ? "✅" : status === "bad" ? "❌" : "⏳";

                const nameEl = document.createElement("span");
                nameEl.className = "check-name";
                nameEl.textContent = name;

                const detailsEl = document.createElement("span");
                detailsEl.className = "check-details";
                detailsEl.textContent = details;

                row.append(icon, nameEl, detailsEl);
                return row;
            }

            function updateCheckRow(name, ok, details = "") {
                const row = document.getElementById(`check-${name}`);
                if (!row) return;
                const icon = row.querySelector(".check-icon");
                const detailsEl = row.querySelector(".check-details");
                icon.className = `check-icon ${ok ? "ok" : "bad"}`;
                icon.textContent = ok ? "✅" : "❌";
                detailsEl.textContent = details;
            }

            function summarizeResult(result) {
                if (result.error) return `error=${result.error}`;
                if (result.status != null) return `status=${result.status}`;
                if (result.returncode != null)
                    return `returncode=${result.returncode}`;
                if (result.sample) return "heartbeat sampled";
                if (result.matches) return `${result.matches.length} issue(s)`;
                return result.ok ? "ok" : "failed";
            }

            async function loadParallelChecks() {
                setSummary("Loading checks in parallel...", "loading");
                checksEl.replaceChildren();

                try {
                    const listRes = await fetch("/api/checks");
                    const listData = await listRes.json();
                    const names = listData.checks || [];

                    if (!names.length) {
                        setSummary("No checks returned", "bad");
                        return;
                    }

                    for (const name of names) {
                        checksEl.appendChild(
                            checkRow(name, "loading", "waiting..."),
                        );
                    }

                    let done = 0;
                    let failures = 0;

                    await Promise.all(
                        names.map(async (name) => {
                            try {
                                const res = await fetch(
                                    `/api/check/${encodeURIComponent(name)}`,
                                );
                                const data = await res.json();
                                const ok = !!data.result?.ok;
                                if (!ok) failures += 1;
                                updateCheckRow(
                                    name,
                                    ok,
                                    summarizeResult(data.result || {}),
                                );
                            } catch (err) {
                                failures += 1;
                                updateCheckRow(
                                    name,
                                    false,
                                    `error=${err.message}`,
                                );
                            } finally {
                                done += 1;
                                if (done < names.length) {
                                    setSummary(
                                        `Running checks... ${done}/${names.length}`,
                                        "loading",
                                    );
                                }
                            }
                        }),
                    );

                    if (failures === 0) {
                        setSummary(
                            `OK (${names.length}/${names.length})`,
                            "ok",
                        );
                    } else {
                        setSummary(
                            `UNHEALTHY (${failures} failed of ${names.length})`,
                            "bad",
                        );
                    }
                } catch (err) {
                    setSummary(`ERROR: ${err.message}`, "bad");
                }
            }

            async function loadFullReport(mode = "full") {
                try {
                    const res = await fetch(`/api/report?mode=${mode}`);
                    const data = await res.json();
                    reportEl.textContent = JSON.stringify(data, null, 2);
                } catch (err) {
                    reportEl.textContent = `ERROR: ${err.message}`;
                }
            }

            document.getElementById("refresh-parallel").onclick = async () => {
                await loadParallelChecks();
                await loadFullReport("parallel");
            };

            document.getElementById("refresh-full").onclick = async () => {
                setSummary("Loading full report...", "loading");
                await loadFullReport("full");
                setSummary("Full report loaded", "ok");
            };

            void (async () => {
                await loadParallelChecks();
                await loadFullReport("parallel");
            })();
        </script>
    </body>
</html>
