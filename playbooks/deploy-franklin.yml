---
- name: Deploy Franklin application artifacts to Raspberry Pi
  hosts: all
  gather_facts: false
  become: true
  vars:
    project_root: "{{ playbook_dir }}/.."
    startup_script_local: "{{ project_root }}/scripts/start_franklin.py"
    startup_gui_script_local: "{{ project_root }}/scripts/start_franklin_gui_session.py"
    app_files_local:
      - "{{ project_root }}/franklin-tui.py"
      - "{{ project_root }}/franklin-gui.py"
      - "{{ project_root }}/franklin-race-recorder.py"
      - "{{ project_root }}/gui_config.py"
      - "{{ project_root }}/scoreboard_web_app.py"
      - "{{ project_root }}/referee_web_app.py"
      - "{{ project_root }}/healthcheck_web_app.py"
      - "{{ project_root }}/driver_web_app.py"
      - "{{ project_root }}/racer_colors.py"
      - "{{ project_root }}/redis_commands.py"
      - "{{ project_root }}/database.py"
    rust_target: "aarch64-unknown-linux-gnu"
    rust_deb_local: "{{ project_root }}/rust/target/debian/franklin-hardware-monitor_{{ pkg_version }}_arm64.deb"

  pre_tasks:
    - name: Verify SSH connectivity
      ansible.builtin.ping:

    - name: Get local package version from Cargo.toml
      ansible.builtin.shell:
        cmd: python3 -c "import re; m = re.search(r'\[workspace\.package\]\s*[\s\S]*?version\s*=\s*\"([^\"]+)\"', open('{{ project_root }}/rust/Cargo.toml').read()); print(m.group(1))"
      delegate_to: localhost
      become: false
      register: local_version_cmd
      changed_when: false

    - name: Set package version variable
      ansible.builtin.set_fact:
        pkg_version: "{{ local_version_cmd.stdout | trim }}"

    - name: Check required local files exist
      ansible.builtin.stat:
        path: "{{ item.path }}"
      delegate_to: localhost
      become: false
      register: required_file_stats
      loop:
        - {
            path: "{{ project_root }}/franklin-tui.py",
            description: "Franklin TUI script",
          }
        - {
            path: "{{ project_root }}/franklin-gui.py",
            description: "Franklin GTK GUI script",
          }
        - {
            path: "{{ project_root }}/franklin-race-recorder.py",
            description: "Franklin race recorder script",
          }
        - {
            path: "{{ project_root }}/gui_config.py",
            description: "GUI config module",
          }
        - {
            path: "{{ project_root }}/scoreboard_web_app.py",
            description: "Scoreboard web app script",
          }
        - {
            path: "{{ project_root }}/referee_web_app.py",
            description: "Referee web app script",
          }
        - {
            path: "{{ project_root }}/healthcheck_web_app.py",
            description: "Health-check web app script",
          }
        - {
            path: "{{ project_root }}/driver_web_app.py",
            description: "Driver web app script",
          }
        - {
            path: "{{ project_root }}/racer_colors.py",
            description: "Racer color scheme module",
          }
        - {
            path: "{{ project_root }}/redis_commands.py",
            description: "Redis command envelope module",
          }
        - { path: "{{ startup_script_local }}", description: "Startup script" }
        - {
            path: "{{ startup_gui_script_local }}",
            description: "GUI startup script",
          }
        - {
            path: "{{ rust_deb_local }}",
            description: "Franklin hardware monitor Debian package. (Please build it locally first using: devbox run hardware-monitor:build-deb)",
          }

    - name: Fail when required local files are missing
      ansible.builtin.fail:
        msg: >-
          Missing required file: {{ item.item.description }}
          ({{ item.item.path }}).
      when: not item.stat.exists
      loop: "{{ required_file_stats.results }}"

    - name: Check optional local directories
      ansible.builtin.stat:
        path: "{{ item.path }}"
      delegate_to: localhost
      become: false
      register: optional_dir_stats
      loop:
        - { key: "static", path: "{{ project_root }}/static" }
        - { key: "race", path: "{{ project_root }}/race" }
        - { key: "tmuxinator", path: "{{ project_root }}/tmuxinator" }

  tasks:
    - name: Ensure destination directory exists
      ansible.builtin.file:
        path: "{{ pi_dest_dir }}"
        state: directory
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"

    - name: Ensure libudev-dev is installed on Pi (required at runtime)
      ansible.builtin.apt:
        name:
          - libudev-dev
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Get installed hardware monitor version on Pi
      ansible.builtin.command:
        cmd: dpkg-query -W -f='${Version}' franklin-hardware-monitor
      register: pi_version_cmd
      failed_when: false
      changed_when: false

    - name: Set installed version fact
      ansible.builtin.set_fact:
        installed_version: "{{ (pi_version_cmd.rc == 0) | ternary(pi_version_cmd.stdout | trim, '0.0.0') }}"

    - name: Copy Debian package to Pi
      ansible.builtin.copy:
        src: "{{ rust_deb_local }}"
        dest: "/tmp/{{ rust_deb_local | basename }}"
        mode: "0644"
      when: pkg_version is version(installed_version, '>')

    - name: Install Debian package on Pi
      ansible.builtin.apt:
        deb: "/tmp/{{ rust_deb_local | basename }}"
        state: present
      when: pkg_version is version(installed_version, '>')

    - name: Remove temporary Debian package from Pi
      ansible.builtin.file:
        path: "/tmp/{{ rust_deb_local | basename }}"
        state: absent
      when: pkg_version is version(installed_version, '>')

    - name: Deploy Python application files
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ pi_dest_dir }}/{{ item | basename }}"
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0644"
      loop: "{{ app_files_local }}"

    - name: Deploy startup scripts
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"
      loop:
        - {
            src: "{{ startup_script_local }}",
            dest: "{{ pi_dest_dir }}/start_franklin.py",
          }
        - {
            src: "{{ startup_gui_script_local }}",
            dest: "{{ pi_dest_dir }}/start_franklin_gui_session.py",
          }

    # Directory trees are pushed with rsync (ansible.posix.synchronize) instead
    # of the copy module: copy walks the tree and transfers every file in its
    # own SSH round-trip (slow), whereas rsync syncs in a single pass and skips
    # unchanged files. We also exclude Python bytecode so __pycache__/*.pyc are
    # never shipped. The connection user (jachin) is unprivileged, so rsync runs
    # under sudo on the Pi (--rsync-path) with become disabled on the task, and
    # ownership is set inline with --chown to match franklin_user/group.
    - name: Deploy static directory
      ansible.posix.synchronize:
        src: "{{ project_root }}/static/"
        dest: "{{ pi_dest_dir }}/static/"
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--rsync-path=sudo rsync"
          - "--chown={{ franklin_user }}:{{ franklin_group }}"
      become: false
      when: (optional_dir_stats.results | selectattr('item.key', 'equalto', 'static') | map(attribute='stat.isdir') | first | default(false))

    - name: Deploy race directory
      ansible.posix.synchronize:
        src: "{{ project_root }}/race/"
        dest: "{{ pi_dest_dir }}/race/"
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--rsync-path=sudo rsync"
          - "--chown={{ franklin_user }}:{{ franklin_group }}"
      become: false
      when: (optional_dir_stats.results | selectattr('item.key', 'equalto', 'race') | map(attribute='stat.isdir') | first | default(false))

    - name: Deploy tmuxinator directory
      ansible.posix.synchronize:
        src: "{{ project_root }}/tmuxinator/"
        dest: "{{ pi_dest_dir }}/tmuxinator/"
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--rsync-path=sudo rsync"
          - "--chown={{ franklin_user }}:{{ franklin_group }}"
      become: false
      when: (optional_dir_stats.results | selectattr('item.key', 'equalto', 'tmuxinator') | map(attribute='stat.isdir') | first | default(false))

    - name: Verify required files on remote host
      ansible.builtin.stat:
        path: "{{ item }}"
      register: remote_required_file_stats
      loop:
        - "/usr/bin/franklin-hardware-monitor"
        - "{{ pi_dest_dir }}/franklin-tui.py"
        - "{{ pi_dest_dir }}/franklin-gui.py"
        - "{{ pi_dest_dir }}/franklin-race-recorder.py"
        - "{{ pi_dest_dir }}/gui_config.py"
        - "{{ pi_dest_dir }}/scoreboard_web_app.py"
        - "{{ pi_dest_dir }}/referee_web_app.py"
        - "{{ pi_dest_dir }}/healthcheck_web_app.py"
        - "{{ pi_dest_dir }}/driver_web_app.py"
        - "{{ pi_dest_dir }}/racer_colors.py"
        - "{{ pi_dest_dir }}/redis_commands.py"
        - "{{ pi_dest_dir }}/start_franklin.py"
        - "{{ pi_dest_dir }}/start_franklin_gui_session.py"
      loop_control:
        label: "{{ item }}"

    - name: Fail if required files are missing on remote host
      ansible.builtin.fail:
        msg: "Expected deployed file is missing: {{ item.item }}"
      when: not item.stat.exists
      loop: "{{ remote_required_file_stats.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read deployed binary file information
      ansible.builtin.command: "file /usr/bin/franklin-hardware-monitor"
      register: binary_file_info
      changed_when: false

    - name: Report binary architecture verification
      ansible.builtin.debug:
        msg: "{{ binary_file_info.stdout }}"

    - name: Warn when binary architecture may not be ARM64
      ansible.builtin.debug:
        msg: "Warning: Could not verify ARM64 architecture in deployed binary output"
      when: >-
        ('ARM aarch64' not in binary_file_info.stdout)
        and ('ARM 64-bit' not in binary_file_info.stdout)

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "Deployment complete to {{ inventory_hostname }}:{{ pi_dest_dir }}"
          - "Deployed: franklin-hardware-monitor, franklin-tui.py, franklin-gui.py, gui_config.py, scoreboard_web_app.py, referee_web_app.py, healthcheck_web_app.py, driver_web_app.py, racer_colors.py, redis_commands.py, database.py, start_franklin.py, start_franklin_gui_session.py"
          - "Optional content copied when present: static/, race/ (race module code), tmuxinator/"
          - "Start on Pi with: cd {{ pi_dest_dir }} && ./start_franklin.py"
