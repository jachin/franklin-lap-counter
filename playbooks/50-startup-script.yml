---
- name: Install startup scripts
  hosts: all
  become: true
  tasks:
    - name: Copy startup scripts to destination directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../scripts/{{ item }}"
        dest: "{{ pi_dest_dir }}/{{ item }}"
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"
      loop:
        - start_franklin.py
        - start_franklin_gui_session.py

    - name: Ensure tmuxinator config directory exists
      ansible.builtin.file:
        path: "{{ pi_dest_dir }}/tmuxinator"
        state: directory
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"

    - name: Copy tmuxinator project configs
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../tmuxinator/{{ item }}"
        dest: "{{ pi_dest_dir }}/tmuxinator/{{ item }}"
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0644"
      loop:
        - franklin.yml
        - franklin-services.yml
        - franklin-simulator.yml
