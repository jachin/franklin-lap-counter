# cross configuration for building franklin-hardware-monitor for the Raspberry Pi.
#
# The monitor depends on `libudev-sys`, which needs the TARGET architecture's
# libudev development package (and pkg-config) available inside the cross build
# container. The stock cross images don't ship it, so install it per build.
# `$CROSS_DEB_ARCH` is provided by cross (e.g. `arm64` for aarch64 targets).
[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get --assume-yes install libudev-dev:$CROSS_DEB_ARCH pkg-config",
]
