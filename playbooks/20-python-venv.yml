---
- name: Create app directory and Python virtual environment
  hosts: all
  become: true
  tasks:
    - name: Ensure destination directory exists and is owned by franklin
      ansible.builtin.file:
        path: "{{ pi_dest_dir }}"
        state: directory
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"

    - name: Ensure Python virtual environment exists (with system site packages for GTK bindings)
      ansible.builtin.command:
        cmd: "python3 -m venv --system-site-packages {{ pi_dest_dir }}/.venv"
        creates: "{{ pi_dest_dir }}/.venv/bin/activate"

    - name: Check whether GTK gi module is importable in venv
      ansible.builtin.command:
        cmd: "{{ pi_dest_dir }}/.venv/bin/python -c 'import gi'"
      register: venv_gi_check
      changed_when: false
      failed_when: false

    - name: Recreate venv with system site packages when gi is missing
      when: venv_gi_check.rc != 0
      block:
        - name: Remove incompatible virtual environment
          ansible.builtin.file:
            path: "{{ pi_dest_dir }}/.venv"
            state: absent

        - name: Recreate virtual environment with system site packages
          ansible.builtin.command:
            cmd: "python3 -m venv --system-site-packages {{ pi_dest_dir }}/.venv"

    - name: Upgrade pip in virtual environment
      ansible.builtin.pip:
        name: pip
        state: latest
        virtualenv: "{{ pi_dest_dir }}/.venv"

    - name: Install/upgrade Python application dependencies
      ansible.builtin.pip:
        name: "{{ python_packages }}"
        state: latest
        virtualenv: "{{ pi_dest_dir }}/.venv"

    - name: Ensure franklin owns the virtual environment
      ansible.builtin.file:
        path: "{{ pi_dest_dir }}/.venv"
        state: directory
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        recurse: true
