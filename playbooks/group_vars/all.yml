---
# Franklin runtime user configuration
franklin_user: franklin
franklin_group: franklin
franklin_home: "/home/{{ franklin_user }}"
franklin_shell: /usr/bin/zsh
franklin_supplementary_groups:
  - dialout
  - video
  - input
  - render

# Boot/login behavior
# WayVNC binds to loopback only (franklin_wayvnc_bind_address) and is reachable
# solely through an SSH tunnel, so VNC-layer auth/encryption is disabled
# (enable_auth=false). SSH provides the encryption and authentication. Use a
# client that supports the "None" security type (e.g. TigerVNC).
franklin_autologin_tty: tty1
franklin_enable_autologin: true
franklin_enable_autostart: true
franklin_enable_wayland_boot: true
franklin_enable_wayvnc: true
franklin_wayvnc_bind_address: 127.0.0.1
franklin_wayvnc_port: 5900
franklin_wayvnc_enable_auth: false
franklin_wayvnc_username: franklin
franklin_wayvnc_password: franklinvnc

# Firmware config path for Raspberry Pi boot settings
pi_firmware_config_path: /boot/firmware/config.txt

# Default target app directory on the Pi
pi_dest_dir: "{{ franklin_home }}/franklin-lap-counter"

# Apt packages required by Franklin setup
system_packages:
  - python3
  - python3-pip
  - python3-venv
  - redis-server
  - tmux
  - zsh
  - ncurses-bin
  - lnav
  - python3-gi
  - gir1.2-gtk-4.0
  - fonts-noto-color-emoji
  - fontconfig
  - sway
  - xwayland
  - seatd

# Python packages installed in the app venv
python_packages:
  - textual
  - redis<6
  - typing-extensions
  - aiohttp
  - pygments
  - rich

# Raspberry Pi AP/router (hotspot) settings
franklin_ap_interface: wlan0
# Uplink can be set explicitly (e.g. eth0), or left as auto to resolve from
# the Pi's current default IPv4 route (portable across different networks).
franklin_uplink_interface: auto
# Fallback uplink interface when no default route exists (for offline setup).
franklin_uplink_interface_fallback: eth0
franklin_ap_ssid: FranklinLapCounter
franklin_ap_passphrase: lapcounter
franklin_ap_channel: 7
franklin_ap_country: US
franklin_ap_address: 10.210.1.1/24
franklin_ap_gateway_ip: 10.210.1.1
franklin_ap_subnet_cidr: 10.210.1.0/24
franklin_ap_netmask: 255.255.255.0
franklin_ap_dhcp_range_start: 10.210.1.50
franklin_ap_dhcp_range_end: 10.210.1.150
franklin_ap_dhcp_lease_time: 24h
franklin_ap_domain: wlan
franklin_ap_dns_name: burke.local
# Additional DNS names to resolve to the Pi AP gateway IP for local apps.
franklin_ap_dns_aliases:
  - lapcounter.local
  - pi.lapcounter.local
  - scoreboard.frank
  - referee.frank
  - healthcheck.frank

# Caddy reverse proxy settings
franklin_scoreboard_domain: scoreboard.frank
franklin_referee_domain: referee.frank
franklin_healthcheck_domain: healthcheck.frank
franklin_scoreboard_upstream: 127.0.0.1:8080
franklin_referee_upstream: 127.0.0.1:8081
franklin_healthcheck_upstream: 127.0.0.1:8082
