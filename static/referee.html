<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Franklin Referee Control</title>
        <style>
            :root {
                color-scheme: light dark;

                --bg: #111;
                --text: #eee;
                --control-bg: #222;
                --control-bg-hover: #2c2c2c;
                --control-border: #444;
                --input-bg: #1b1b1b;
                --surface: #000;
                --surface-border: #333;
            }

            @media (prefers-color-scheme: light) {
                :root {
                    --bg: #f6f8fa;
                    --text: #1f2328;
                    --control-bg: #ffffff;
                    --control-bg-hover: #f3f4f6;
                    --control-border: #c7ced6;
                    --input-bg: #ffffff;
                    --surface: #ffffff;
                    --surface-border: #d0d7de;
                }
            }

            body {
                font-family:
                    system-ui,
                    -apple-system,
                    Segoe UI,
                    Roboto,
                    sans-serif;
                margin: 16px;
                background: var(--bg);
                color: var(--text);
            }
            h1 {
                margin-top: 0;
            }
            .row {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                margin-bottom: 12px;
            }
            button {
                padding: 8px 12px;
                border: 1px solid var(--control-border);
                background: var(--control-bg);
                color: var(--text);
                border-radius: 6px;
                cursor: pointer;
            }
            button:hover {
                background: var(--control-bg-hover);
            }
            input,
            select {
                padding: 8px;
                border: 1px solid var(--control-border);
                background: var(--input-bg);
                color: var(--text);
                border-radius: 6px;
            }
            #events,
            #audit {
                background: var(--surface);
                border: 1px solid var(--surface-border);
                padding: 10px;
                height: 320px;
                overflow-y: auto;
                font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            }
            #events {
                white-space: pre-wrap;
            }
            .audit-row {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 6px;
            }
            .audit-row-text {
                white-space: pre-wrap;
                word-break: break-word;
                flex: 1;
            }
            .copy-btn {
                padding: 4px 8px;
                font-size: 12px;
            }
        </style>
    </head>
    <body>
        <style>
            .dash-link {
                display: inline-block;
                font-size: 0.8rem;
                opacity: 0.6;
                text-decoration: none;
                color: inherit;
                margin-bottom: 8px;
            }
            .dash-link:hover { opacity: 1; text-decoration: underline; }
        </style>
        <a id="dashLink" class="dash-link" href="#">← Dashboard</a>
        <script>document.getElementById('dashLink').href = `${location.protocol}//${location.hostname}:8085/dashboard`</script>
        <h1>Referee Control</h1>

        <div class="row">
            <button type="button" id="start-race">Start Race</button>
            <button type="button" id="end-race">End Race</button>
            <button type="button" id="reset-race">Reset Race</button>
        </div>

        <div class="row">
            <select id="penalty-racer">
                <option value="">— Select racer —</option>
            </select>
            <select id="penalty-seconds">
                <option value="5">5 seconds</option>
                <option value="10">10 seconds</option>
                <option value="20">20 seconds</option>
                <option value="30">30 seconds</option>
                <option value="60">60 seconds</option>
            </select>
            <input
                id="penalty-reason"
                type="text"
                placeholder="Penalty reason"
            />
            <button type="button" id="add-penalty">Add Penalty</button>
        </div>

        <div class="row">
            <select id="remove-lap-racer">
                <option value="">— Select racer —</option>
            </select>
            <input
                id="remove-lap-number"
                type="number"
                min="1"
                placeholder="Lap number (optional)"
            />
            <input
                id="remove-lap-reason"
                type="text"
                placeholder="Remove lap reason"
            />
            <button type="button" id="remove-lap">Remove Lap</button>
        </div>

        <div class="row">
            <select id="dq-racer">
                <option value="">— Select racer —</option>
            </select>
            <input id="dq-reason" type="text" placeholder="DQ reason" />
            <button type="button" id="disqualify-racer">
                Disqualify Racer
            </button>
        </div>

        <div class="row">
            <label>
                <input type="checkbox" id="hide-status" checked />
                Hide debug information
            </label>
        </div>

        <h2>Live Events</h2>
        <div id="events"></div>

        <h2>Audit Log</h2>
        <div class="row">
            <input
                id="audit-race-id"
                type="number"
                min="1"
                placeholder="Race ID (optional)"
            />
            <input id="audit-limit" type="number" min="1" value="100" />
            <button type="button" id="load-audit">Load Audit</button>
        </div>
        <div id="audit"></div>

        <script>
            const eventsEl = document.getElementById("events");
            const auditEl = document.getElementById("audit");

            const allEntries = [];

            function log(line, msg) {
                allEntries.push({ line, msg: msg || null, ts: new Date().toLocaleTimeString() });
                renderEvents();
            }

            function shouldHide(msg) {
                if (!document.getElementById("hide-status").checked) return false;
                if (msg.type === "heartbeat") return true;
                if (msg.snapshot_seq !== undefined) return true;
                return false;
            }

            function renderEvents() {
                const hide = document.getElementById("hide-status").checked;
                eventsEl.textContent = "";
                for (const entry of allEntries) {
                    if (hide && entry.msg && shouldHide(entry.msg)) continue;
                    eventsEl.textContent += `[${entry.ts}] ${entry.line}\n`;
                }
                eventsEl.scrollTop = eventsEl.scrollHeight;
            }

            async function copyToClipboard(value) {
                if (!value) {
                    throw new Error("No command_id available to copy");
                }
                await navigator.clipboard.writeText(value);
            }

            function buildAuditLine(a) {
                const ts = a.created_at || "";
                const status = a.accepted ? "accepted" : "rejected";
                const cmdId = a.command_id || "-";
                const details = [];
                if (a.racer_id != null) details.push(`racer_id=${a.racer_id}`);
                if (a.lap_number != null)
                    details.push(`lap_number=${a.lap_number}`);
                if (a.penalty_seconds != null)
                    details.push(`penalty_seconds=${a.penalty_seconds}`);
                if (a.reason) details.push(`reason=${a.reason}`);
                if (a.message) details.push(`message=${a.message}`);

                return `[${ts}] ${a.command} ${status} command_id=${cmdId}${details.length ? ` (${details.join(", ")})` : ""}`;
            }

            function renderAudit(actions) {
                auditEl.replaceChildren();

                if (!actions.length) {
                    auditEl.textContent = "No audit rows";
                    return;
                }

                for (const action of actions) {
                    const row = document.createElement("div");
                    row.className = "audit-row";

                    const copyButton = document.createElement("button");
                    copyButton.type = "button";
                    copyButton.className = "copy-btn";
                    copyButton.textContent = "Copy";

                    const commandId = action.command_id;
                    if (commandId) {
                        copyButton.dataset.commandId = commandId;
                        copyButton.title = `Copy command_id ${commandId}`;
                    } else {
                        copyButton.disabled = true;
                        copyButton.title = "No command_id for this row";
                    }

                    const text = document.createElement("div");
                    text.className = "audit-row-text";
                    text.textContent = buildAuditLine(action);

                    row.append(copyButton, text);
                    auditEl.appendChild(row);
                }
            }

            async function loadAudit() {
                try {
                    const raceIdRaw =
                        document.getElementById("audit-race-id").value;
                    const limitRaw =
                        document.getElementById("audit-limit").value;
                    const params = new URLSearchParams();
                    if (raceIdRaw !== "") params.set("race_id", raceIdRaw);
                    if (limitRaw !== "") params.set("limit", limitRaw);

                    const res = await fetch(
                        `/api/control/audit?${params.toString()}`,
                    );
                    const data = await res.json();
                    if (!res.ok || !data.ok) {
                        throw new Error(
                            data.error || `Request failed (${res.status})`,
                        );
                    }
                    renderAudit(data.actions || []);
                    log(`Loaded ${data.count || 0} audit rows`);
                } catch (err) {
                    log(`ERROR: ${err.message}`);
                }
            }

            async function postJson(url, body = {}) {
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });

                let data = {};
                try {
                    data = await res.json();
                } catch (_) {}

                if (!res.ok) {
                    throw new Error(
                        data.error || `Request failed (${res.status})`,
                    );
                }

                return data;
            }

            document.getElementById("start-race").onclick = async () => {
                try {
                    await postJson("/api/control/start_race");
                    log("Sent: start_race");
                } catch (err) {
                    log(`ERROR: ${err.message}`);
                }
            };

            document.getElementById("end-race").onclick = async () => {
                try {
                    await postJson("/api/control/end_race");
                    log("Sent: end_race");
                } catch (err) {
                    log(`ERROR: ${err.message}`);
                }
            };

            document.getElementById("reset-race").onclick = async () => {
                try {
                    await postJson("/api/control/reset_race");
                    log("Sent: reset_race");
                } catch (err) {
                    log(`ERROR: ${err.message}`);
                }
            };

            function populateRacerSelects(contestants) {
                const options = contestants.map(
                    (c) =>
                        `<option value="${c.transmitter_id}">${c.name} (ID ${c.transmitter_id})</option>`,
                );
                const placeholder = `<option value="">— Select racer —</option>`;
                const html = placeholder + options.join("");
                document.getElementById("penalty-racer").innerHTML = html;
                document.getElementById("remove-lap-racer").innerHTML = html;
                document.getElementById("dq-racer").innerHTML = html;
            }

            async function loadRacers() {
                try {
                    const res = await fetch("/api/config");
                    const data = await res.json();
                    const contestants = data.contestants || [];
                    populateRacerSelects(contestants);
                    log(`Loaded ${contestants.length} racer(s)`);
                } catch (err) {
                    log(`ERROR: Failed to load racers — ${err.message}`);
                }
            }

            function racerIdOrThrow(el) {
                const val = el.value;
                if (!val) throw new Error("No racer selected");
                return parseInt(val, 10);
            }

            document.getElementById("add-penalty").onclick = async () => {
                try {
                    const racerId = racerIdOrThrow(
                        document.getElementById("penalty-racer"),
                    );
                    const penaltySeconds = parseInt(
                        document.getElementById("penalty-seconds").value,
                        10,
                    );
                    const reason =
                        document.getElementById("penalty-reason").value || "";
                    await postJson("/api/control/add_penalty", {
                        racer_id: racerId,
                        penalty_seconds: penaltySeconds,
                        reason,
                    });
                    log(
                        `Sent: add_penalty racer=${racerId} seconds=${penaltySeconds}`,
                    );
                } catch (err) {
                    log(`ERROR: ${err.message}`);
                }
            };

            document.getElementById("remove-lap").onclick = async () => {
                try {
                    const racerId = racerIdOrThrow(
                        document.getElementById("remove-lap-racer"),
                    );
                    const lapNumberRaw =
                        document.getElementById("remove-lap-number").value;
                    const reason =
                        document.getElementById("remove-lap-reason").value ||
                        "";
                    const payload = {
                        racer_id: racerId,
                        reason,
                    };
                    if (lapNumberRaw !== "") {
                        payload.lap_number = parseInt(lapNumberRaw, 10);
                    }
                    await postJson("/api/control/remove_lap", payload);
                    log(
                        `Sent: remove_lap racer=${racerId} lap=${payload.lap_number || "latest"}`,
                    );
                } catch (err) {
                    log(`ERROR: ${err.message}`);
                }
            };

            document.getElementById("disqualify-racer").onclick = async () => {
                try {
                    const racerId = racerIdOrThrow(
                        document.getElementById("dq-racer"),
                    );
                    const reason =
                        document.getElementById("dq-reason").value || "";
                    await postJson("/api/control/disqualify_racer", {
                        racer_id: racerId,
                        reason,
                    });
                    log(`Sent: disqualify_racer racer=${racerId}`);
                } catch (err) {
                    log(`ERROR: ${err.message}`);
                }
            };

            document.getElementById("load-audit").onclick = loadAudit;

            document.getElementById("hide-status").addEventListener("change", renderEvents);

            auditEl.addEventListener("click", async (evt) => {
                const target = evt.target;
                if (!(target instanceof HTMLElement)) return;
                if (!target.classList.contains("copy-btn")) return;

                const commandId = target.dataset.commandId;
                try {
                    await copyToClipboard(commandId);
                    log(`Copied command_id: ${commandId}`);
                } catch (err) {
                    log(`ERROR: ${err.message}`);
                }
            });

            const wsProto =
                window.location.protocol === "https:" ? "wss" : "ws";
            const ws = new WebSocket(`${wsProto}://${window.location.host}/ws`);
            ws.onopen = () => log("WebSocket connected");

            ws.onmessage = (evt) => {
                try {
                    const msg = JSON.parse(evt.data);

                    if (msg.snapshot_seq !== undefined) {
                        log(`RACE STATE: ${String(msg.state || "unknown").toUpperCase()}`, msg);
                        return;
                    }
                    if (msg.type === "countdown_phase") {
                        const at = Number(msg.at);
                        const when = Number.isFinite(at)
                            ? new Date(at * 1000).toLocaleTimeString()
                            : "n/a";
                        log(
                            `COUNTDOWN ${String(msg.phase || "").toUpperCase()} at ${when}`,
                            msg,
                        );
                    } else if (msg.type === "start_race") {
                        const at = Number(msg.at);
                        const when = Number.isFinite(at)
                            ? new Date(at * 1000).toLocaleTimeString()
                            : "n/a";
                        log(
                            `START_RACE scheduled at ${when}${msg.simulated ? " [SIM]" : ""}`,
                            msg,
                        );
                    } else {
                        log(JSON.stringify(msg), msg);
                    }
                } catch (_) {
                    log(evt.data);
                }
            };
            ws.onerror = () => log("WebSocket error");
            ws.onclose = () => log("WebSocket closed");

            void loadAudit();
            void loadRacers();
        </script>
    </body>
</html>
