# Franklin services-only tmuxinator configuration (for GUI boot)
name: franklin-services
root: .

startup_window: web_scoreboard

pre_window: |
  source .venv/bin/activate
  export FRANKLIN_SESSION=tmux

windows:
  - redis:
      layout: main-horizontal
      panes:
        - redis-server:
            - echo "Starting Redis with Unix socket (logging to redis.log)..."
            - redis-server --port 0 --unixsocket ./redis.sock --unixsocketperm 700 --loglevel notice --logfile ./redis.log
  - hardware:
      layout: main-horizontal
      panes:
        - monitor:
            - echo "Waiting for Redis to be ready..."
            - sleep 2
            - echo "Starting Hardware Monitor..."
            - if [ -f ./franklin-hardware-monitor ]; then ./franklin-hardware-monitor; elif command -v franklin-hardware-monitor >/dev/null 2>&1; then franklin-hardware-monitor; else cargo run --manifest-path rust/Cargo.toml --bin franklin-hardware-monitor; fi
  - race_recorder:
      layout: main-horizontal
      panes:
        - recorder:
            - echo "Waiting for services to be ready..."
            - sleep 3
            - echo "Starting Race Recorder (authoritative; owns recording + DB)..."
            - python franklin-race-recorder.py
  - web_scoreboard:
      layout: main-horizontal
      panes:
        - server:
            - echo "Waiting for services to be ready..."
            - sleep 3
            - echo "Starting Web Server..."
            - python scoreboard_web_app.py
  - web_referee:
      layout: main-horizontal
      panes:
        - server:
            - echo "Waiting for services to be ready..."
            - sleep 3
            - echo "Starting Referee Web Server..."
            - python referee_web_app.py
  - web_healthcheck:
      layout: main-horizontal
      panes:
        - server:
            - echo "Waiting for services to be ready..."
            - sleep 3
            - echo "Starting Health Check Web Server..."
            - python healthcheck_web_app.py
  - web_driver:
      layout: main-horizontal
      panes:
        - server:
            - echo "Waiting for services to be ready..."
            - sleep 3
            - echo "Starting Driver Web Server..."
            - python driver_web_app.py
