---
- name: Provision franklin runtime user and shell environment
  hosts: all
  become: true
  tasks:
    - name: Ensure franklin group exists
      ansible.builtin.group:
        name: "{{ franklin_group }}"
        state: present

    - name: Ensure franklin user exists with zsh shell
      ansible.builtin.user:
        name: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        groups: "{{ franklin_supplementary_groups | join(',') }}"
        append: true
        shell: "{{ franklin_shell }}"
        create_home: true
        home: "{{ franklin_home }}"
        state: present

    - name: Ensure app destination directory exists and is owned by franklin
      ansible.builtin.file:
        path: "{{ pi_dest_dir }}"
        state: directory
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"

    - name: Ensure franklin terminfo directory exists
      ansible.builtin.file:
        path: "{{ franklin_home }}/.terminfo"
        state: directory
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"

    - name: Copy checked-in xterm-ghostty terminfo source to remote
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../terminfo/xterm-ghostty.terminfo"
        dest: /tmp/xterm-ghostty.terminfo
        mode: "0644"

    - name: Compile xterm-ghostty terminfo into franklin home
      ansible.builtin.command: >-
        tic -x -o {{ franklin_home }}/.terminfo /tmp/xterm-ghostty.terminfo
      changed_when: true

    - name: Ensure franklin owns installed Ghostty terminfo
      ansible.builtin.file:
        path: "{{ franklin_home }}/.terminfo"
        state: directory
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        recurse: true

    - name: Remove temporary terminfo source file
      ansible.builtin.file:
        path: /tmp/xterm-ghostty.terminfo
        state: absent

    - name: Configure TERM fallback when xterm-ghostty terminfo is unavailable
      ansible.builtin.blockinfile:
        path: "{{ franklin_home }}/.zprofile"
        create: true
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0644"
        marker: "# {mark} ANSIBLE MANAGED TERMINAL FALLBACK"
        block: |
          # Ensure tmux and related tools work even if xterm-ghostty terminfo
          # isn't installed on this Pi.
          export TERMINFO_DIRS="${HOME}/.terminfo:/usr/share/terminfo"
          if [[ "${TERM:-}" == "xterm-ghostty" ]]; then
            if ! infocmp -x xterm-ghostty >/dev/null 2>&1; then
              export TERM="xterm-256color"
            fi
          fi
